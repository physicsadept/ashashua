<head>
<title>Creature Poll</title>
<bgsound src="midi/somend.mid" loop="-1">
<style><!--
  A:hover { color:#c0c0ff }
//--></style>
<script>
var creatures = [
  { name: "Wookie Poodle", img: "images/wookie.jpg",    alt: "Wookie Poodle" },
  { name: "Reemer",        img: "images/reem.jpg",       alt: "Reemer" },
  { name: "Crontosh",      img: "images/cront.jpg",      alt: "Crontosh" },
  { name: "Koncatreen",    img: "images/konc.jpg",       alt: "Koncatreen" },
  { name: "Rufflecrumb",   img: "images_dalle/ruffle.png", alt: "Rufflecrumb", imgWidth: 40, imgHeight: 40 }
];

function submitPoll() {
  // Find which creature was voted for
  var chosen = -1;
  var radios = document.getElementsByName("poll");
  for (var i = 0; i < radios.length; i++) {
    if (radios[i].checked) {
      chosen = parseInt(radios[i].value) - 1; // 0-indexed
      break;
    }
  }
  if (chosen === -1) {
    alert("You must select a creature before voting!");
    return false;
  }

  // Total votes: random between 10,000 and 20,000
  var total = Math.floor(Math.random() * 10001) + 10000;

  // Pick a winner that is NOT the chosen creature
  var winner = chosen;
  while (winner === chosen) {
    winner = Math.floor(Math.random() * creatures.length);
  }

  // Generate random vote shares:
  // Winner gets the most, chosen gets second, rest share the remainder
  // We'll generate raw weights then normalize
  var weights = [];
  for (var i = 0; i < creatures.length; i++) {
    weights[i] = Math.random();
  }

  // Force ordering: winner > chosen > everyone else
  var maxW = Math.max.apply(null, weights);
  var minOther = 999;
  for (var i = 0; i < weights.length; i++) {
    if (i !== winner && i !== chosen && weights[i] < minOther) minOther = weights[i];
  }

  // Ensure winner is highest
  weights[winner] = maxW * 1.1 + 0.01;
  // Ensure chosen is second (above all non-winner, non-chosen)
  var secondVal = 0;
  for (var i = 0; i < weights.length; i++) {
    if (i !== winner && weights[i] > secondVal) secondVal = weights[i];
  }
  weights[chosen] = secondVal * 1.05 + 0.005;
  // Make sure winner is still above chosen
  if (weights[winner] <= weights[chosen]) {
    weights[winner] = weights[chosen] * 1.1 + 0.01;
  }

  // Normalize to total votes
  var sum = 0;
  for (var i = 0; i < weights.length; i++) sum += weights[i];
  var votes = [];
  var assigned = 0;
  for (var i = 0; i < weights.length; i++) {
    if (i === creatures.length - 1) {
      votes[i] = total - assigned; // last one gets remainder
    } else {
      votes[i] = Math.round((weights[i] / sum) * total);
      assigned += votes[i];
    }
  }

  // Sort indices by votes descending for display
  var order = [];
  for (var i = 0; i < creatures.length; i++) order[i] = i;
  order.sort(function(a, b) { return votes[b] - votes[a]; });

  // Build results HTML
  var html = '<table border="0" cellpadding="2" width="100%">';
  for (var r = 0; r < order.length; r++) {
    var idx = order[r];
    var pct = Math.round((votes[idx] / total) * 100);
    var isChosen = (idx === chosen);
    var isWinner = (idx === winner);
    var label = creatures[idx].name;
    if (isWinner) label += ' &#127942;';
    if (isChosen) label += ' <em>(your vote)</em>';
    html += '<tr>';
    html += '<td width="80"><font color="#FFFF00" size="2">' + label + '</font></td>';
    html += '<td><div style="background:#00FF40;width:' + Math.max(pct * 1.2, 2) + 'px;height:10px;display:inline-block;"></div></td>';
    html += '<td><font color="#FFFF00" size="2">' + pct + '% (' + votes[idx].toLocaleString() + ')</font></td>';
    html += '</tr>';
  }
  html += '</table>';
  html += '<p align="center"><font color="#00FFFF" size="2"><em>' + total.toLocaleString() + ' total votes</em></font></p>';
  document.getElementById("poll-form-area").innerHTML = html;
  document.getElementById("poll-note-area").innerHTML = '<blockquote><p><font face="Courier New, Courier, monospace" color="#00FF41" size="2"><em>Galderian 51 Archive &mdash; Creature Analytics Division<br>Vote tallies are independently estimated by a team of Earth analysts who have been studying these creatures from a comfortable distance since 1999. Results may vary depending on atmospheric humidity and the current location of Ashashua\'s moons.</em></font></p></blockquote>';
  return false;
}
</script>
<script>
window.addEventListener('DOMContentLoaded', function() {
  var audio = new Audio('mp3/kakkara-the-fairy-child-.mp3');
  audio.loop = true;
  var unlocked = false;
  var playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.catch(function() {
      function unlock() {
        if (unlocked) return;
        unlocked = true;
        audio.play().catch(function(){});
        document.removeEventListener('click', unlock);
        document.removeEventListener('keydown', unlock);
        document.removeEventListener('scroll', unlock);
      }
      document.addEventListener('click', unlock);
      document.addEventListener('keydown', unlock);
      document.addEventListener('scroll', unlock);
    });
  }
  var btn = document.createElement('button');
  btn.textContent = '\u266a';
  btn.title = 'Toggle music';
  btn.style.cssText = 'position:fixed;top:8px;right:8px;z-index:1000;background:#000;color:#00FF41;border:1px solid #00FF41;font-size:14px;padding:3px 7px;cursor:pointer;font-family:"Courier New",Courier,monospace;opacity:0.75;line-height:1;';
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    unlocked = true;
    if (audio.paused) { audio.play().catch(function(){}); } else { audio.pause(); }
  });
  audio.addEventListener('play', function() { btn.style.opacity = '0.9'; btn.style.color = '#00FF41'; });
  audio.addEventListener('pause', function() { btn.style.opacity = '0.5'; btn.style.color = '#555'; });
  document.body.appendChild(btn);
});
</script>
